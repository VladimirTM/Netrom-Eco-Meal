services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: EcoMealTest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ecomeal-test-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__EcoMealContext: "Host=db;Port=5432;Database=EcoMealTest;Username=postgres;Password=postgres"
      SeedAdmin__Email: admin@ecomeal.local
      SeedAdmin__Password: Admin123!
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ecomeal-test-db:
